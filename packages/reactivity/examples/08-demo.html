<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <script type="module">
      import { reactive, effect } from '../dist/reactivity.esm.js'

      const state = reactive(['a', 'b', 'c', 'd'])

      effect(() => {
        console.log('state[3] ==>', state[3])
        // console.log('state.length ===>', state.length)
        console.log(state)
      })

      setTimeout(() => {
        state.push('e')
      }, 1000)
    </script>
  </body>
</html>
