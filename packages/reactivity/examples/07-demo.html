<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <script type="module">
      // import {
      //   effect,
      //   ref,
      // } from '../../../node_modules/vue/dist/vue.esm-browser.js'
      import { ref, watch, reactive } from '../dist/reactivity.esm.js'

      const state = ref({
        a: {
          b: {
            c: 1,
          },
        },
      })
      // 如果值是 reactive， 那么默认 deep 为 true

      // state.value.c = state.value

      const stop = watch(
        () => state.value,
        (newValue, oldValue) => {
          console.log('newValue ==>', newValue)
          console.log('oldValue ==>', oldValue)
        },
        {
          deep: 3,
        },
      )

      setTimeout(() => {
        console.log('=======>')
        state.value.a.b.c = 2
      }, 1000)
    </script>
  </body>
</html>
