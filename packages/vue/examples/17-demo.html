<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      // import { render } from '../../../node_modules/vue/dist/vue.esm-browser.js'
      import { h, createApp, ref, provide, inject } from '../dist/vue.esm.js'

      const Child = {
        setup() {
          const count = inject('count')
          const a = inject('a')
          console.log('count ==>', count.value)
          return () => {
            return h('div', ['我是子组件', count.value, a.value])
          }
        },
      }

      const App = {
        name: 'APP',
        setup() {
          const count = ref(0)

          provide('count', count)

          setInterval(() => count.value++, 1000)

          return () => {
            return h('div', [
              h('p', { id: 'container', ref: 'elRef' }, '我是父组件的p标签'),
              h(Child),
            ])
          }
        },
      }
      const app = createApp(App, { msg: 'hello' })
      const a = ref('aa')
      app.provide('a', a)

      app.mount('#app')
    </script>
  </body>
</html>
