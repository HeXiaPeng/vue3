<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      // import { render } from '../../../node_modules/vue/dist/vue.esm-browser.js'
      import { h, createApp, ref, nextTick } from '../dist/vue.esm.js'

      /**
       * 插槽分为三种：
       * 匿名插槽 => 默认插槽
       * 具名插槽 => header footer
       * 作用域插槽 => 可以传参数
       *
       */
      const Child = {
        setup(props, { slots }) {
          return () => {
            // return h('div', [
            //   slots.header(),
            //   slots.default(),
            //   slots.footer({ a: '子组件传递的内容' }),
            // ])
            return h('div', [slots.default(), '子组件的内容'])
          }
        },
      }
      const Comp = {
        setup(props, { attrs }) {
          /**
           * <Child>
           *  <template #header>
           *    <div> 父组件传递的插槽</div>
           *  </template>
           * </Child>
           *
           */
          // return () => {
          //   return h('div', [
          //     h('p', '我是父组件的p标签'),
          //     h(Child, null, {
          //       // 具名插槽
          //       header: () => h('div', '父组件传递的插槽 header'),
          //       // 默认插槽
          //       default: () => h('div', '默认插槽'),
          //       // 作用域插槽
          //       footer: ({ a }) => h('div', a),
          //     }),
          //   ])
          // }
          return () => {
            return h('div', [
              h('p', '我是父组件的p标签'),
              h(Child, null, () => h('div', '默认插槽')),
            ])
          }
        },
      }
      createApp(Comp, { msg: 'hello' }).mount('#app')
    </script>
  </body>
</html>
