<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <div id="app"></div>
    <div id="container"></div>

    <script type="module">
      // import { render } from '../../../node_modules/vue/dist/vue.esm-browser.js'
      import { h, createApp, ref, Teleport } from '../dist/vue.esm.js'

      const Child = {
        setup() {
          return () => {
            return h('div', ['我是子组件'])
          }
        },
      }

      const App = {
        name: 'APP',
        setup() {
          const list = ref([1, 2])
          return () => {
            return h('div', [
              h(
                Teleport,
                { to: 'body' },
                list.value.map(item => h('div', item)),
              ),
            ])
          }
        },
      }
      const app = createApp(App)
      app.mount('#app')

      setTimeout(() => {
        app.unmount()
      }, 1000)
    </script>
  </body>
</html>
