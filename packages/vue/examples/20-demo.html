<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
    <style>
      #app {
        padding: 100px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script type="module">
      // import { render } from '../../../node_modules/vue/dist/vue.esm-browser.js'
      import {
        h,
        createApp,
        ref,
        KeepAlive,
        onMounted,
        onUnmounted,
      } from '../dist/vue.esm.js'

      const Comp1 = {
        name: 'Comp1',
        setup() {
          onMounted(() => {
            console.log('挂载Comp1')
          })
          onUnmounted(() => {
            console.log('卸载Comp1')
          })
          return () => {
            return h('div', ['Comp1', h('input')])
          }
        },
      }

      const Comp2 = {
        name: 'Comp2',
        setup() {
          onMounted(() => {
            console.log('挂载Comp2')
          })
          onUnmounted(() => {
            console.log('卸载Comp2')
          })
          return () => {
            return h('div', ['Comp2', h('input')])
          }
        },
      }

      const Comp3 = {
        name: 'Comp3',
        setup() {
          onMounted(() => {
            console.log('挂载Comp3')
          })
          onUnmounted(() => {
            console.log('卸载Comp3')
          })
          return () => {
            return h('div', ['Comp3', h('input')])
          }
        },
      }

      const App = {
        name: 'APP',
        setup() {
          const components = [Comp1, Comp2, Comp3]
          const index = ref(0)
          function onClick() {
            index.value = (index.value + 1) % 3
          }
          return () => {
            return h('div', [
              h(
                'button',
                {
                  onClick,
                },
                '切换组件',
              ),
              h(KeepAlive, { max: 2 }, () => h(components[index.value])),
            ])
          }
        },
      }
      const app = createApp(App)
      app.mount('#app')
    </script>
  </body>
</html>
