<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
    <style>
      /* 下面我们会解释这些 class 是做什么的 */
      .v-enter-active,
      .v-leave-active {
        transition: opacity 0.5s ease;
      }

      .v-enter-from,
      .v-leave-to {
        opacity: 0;
        /* transform: translateX(30px); */
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script type="module">
      // import { render } from '../../../node_modules/vue/dist/vue.esm-browser.js'
      import { h, createApp, ref, Transition } from '../dist/vue.esm.js'
      const App = {
        name: 'APP',
        setup() {
          const show = ref(true)
          function onClick() {
            show.value = !show.value
          }
          return () => {
            return h('div', [
              h(
                'button',
                {
                  onClick,
                },
                '切换组件',
              ),
              h(
                Transition,
                {
                  onBeforeEnter(el) {
                    console.log('onBeforeEnter ==>', el)
                  },
                  onEnter(el, done) {},
                  onLeave(el) {
                    console.log('onLeave ==>', el)
                  },
                },
                () => (show.value ? h('p', 'hello world') : undefined),
              ),
            ])
          }
        },
      }
      const app = createApp(App)
      app.mount('#app')
    </script>
  </body>
</html>
