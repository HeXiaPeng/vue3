<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import {
        h,
        render,
        createRenderer,
      } from '../../../node_modules/vue/dist/vue.esm-browser.js'
      import { renderOptions } from '../dist/vue.esm.js'

      const renderer = createRenderer(renderOptions)

      const vnode = h(
        'div',
        {
          id: 1,
        },
        'hello wold',
      )

      const vnode2 = h(
        'div',
        {
          id: 2,
        },
        'hello wold',
      )

      renderer.render(vnode, app)

      setTimeout(() => {
        renderer.render(vnode2, app)
      }, 1000)
    </script>
  </body>
</html>
