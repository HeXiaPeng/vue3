<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      // import { render } from '../../../node_modules/vue/dist/vue.esm-browser.js'
      import {
        h,
        createApp,
        ref,
        getCurrentInstance,
        onBeforeMount,
        onMounted,
        onBeforeUpdate,
        onUpdated,
        onBeforeUnmount,
        onUnmounted,
        useTemplateRef,
      } from '../dist/vue.esm.js'

      const Child = {
        setup(props, { attrs, slots, emit, expose }) {
          /**
           * 如果手动调用了 expose, 那么父组件通过 ref 获取到子组件实例的时候，只能获取到：expose 暴露的属性 和 $props, $attrs, $slots
           * 如果用户没有调用 expose，那么父组件可以通过 ref 获取到子组件的 instance.proxy
           */
          expose({
            a: ref(0),
            foo() {
              console.log('子组件暴露的 foo')
            },
          })
          return () => {
            return h('div', ['我是子组件'])
          }
        },
      }

      const Comp = {
        setup() {
          const elRef = ref()
          const childRef = ref()
          const vm = getCurrentInstance()

          const el = useTemplateRef('elRef')
          onMounted(() => {
            // console.log('===>', elRef.value)
            console.log('elRef', el.value)
          })

          const flag = ref(true)
          setTimeout(() => {
            flag.value = false
          }, 1000)

          return () => {
            return h('div', [
              h('p', { id: 'container', ref: 'elRef' }, '我是父组件的p标签'),
              // flag.value
              //   ? h(Child, {
              //       ref: 'childRef',
              //     })
              //   : '',
            ])
          }
        },
      }
      const app = createApp(Comp, { msg: 'hello' })
      app.mount('#app')
    </script>
  </body>
</html>
