<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <div id="app"></div>
    <button id="btn">count ++</button>
    <script type="module">
      // import { render } from '../../../node_modules/vue/dist/vue.esm-browser.js'
      import { h, createApp, ref, nextTick } from '../dist/vue.esm.js'

      /**
       * 属性
       * props
       * attrs
       */
      const Comp = {
        props: ['msg'],
        // props: {
        //   msg: String,
        // },
        setup(props, { attrs }) {
          const count = ref(0)
          btn.onclick = () => {
            count.value++
            count.value++
            count.value++
          }
          const container = document.querySelector('#container')

          nextTick(() => {
            console.log('dom ==>', container.textContent)
          })

          return () => {
            console.count('render')
            return h('div', { id: 'container' }, count.value)
          }
        },
      }
      createApp(Comp, { msg: 'hello', count: 0 }).mount('#app')

      // setTimeout(() => {
      //   render(vnode2, app)
      // }, 1000)
    </script>
  </body>
</html>
