<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <div id="app"></div>
    <button id="btn">count ++</button>
    <script type="module">
      // import { render } from '../../../node_modules/vue/dist/vue.esm-browser.js'
      import { h, Text, render, createApp, ref } from '../dist/vue.esm.js'

      const Comp = {
        setup() {
          const count = ref(0)
          btn.onclick = () => {
            count.value++
            console.log(count.value)
          }
          return { count }
        },
        render() {
          return h('div', this.count)
        },
      }
      createApp(Comp).mount('#app')

      // setTimeout(() => {
      //   render(vnode2, app)
      // }, 1000)
    </script>
  </body>
</html>
