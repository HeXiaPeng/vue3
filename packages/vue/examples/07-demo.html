<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>

  <body>
    <div id="app"></div>
    <script type="module">
      // import { render } from '../../../node_modules/vue/dist/vue.esm-browser.js'
      import { h, Text, render } from '../dist/vue.esm.js'

      // const vnode1 = h('div', { style: { color: 'red' } }, 'hello world')

      const vnode2 = h('div', null, ['world', 'hello'])

      render(vnode1, app)

      setTimeout(() => {

      }, 1000)
